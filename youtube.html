<!DOCTYPE html>
<html>
  <head>
    <title>youtube.com</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }

      .searchbox {
        color: rgb(14, 13, 13);
        font-size: 20px;
        margin: 20px 0;
        display: block;
      }

      .video1-preview {
        width: 340px;
      }

      .thumbnail {
        width: 300px;
        display: block;
        margin-bottom: 12px;
      }

      .bottom-block {
        text-align: left;
      }

      .profile1 {
        width: 40px;
        display: inline-block;
        vertical-align: top;
        margin-right: 12px;
      }

      .picture1 {
        border-radius: 40px;
        width: 100%;
        display: block;
      }

      .description {
        width: 248px;
        display: inline-block;
        vertical-align: top;
      }

      .video-title {
        font-size: 20px;
        font-weight: bold;
        margin: 0 0 4px;
      }

      .video-author,
      .video-stats {
        font-size: 14px;
        color: rgb(14, 13, 13);
        margin: 0 0 4px;
      }
    </style>
  </head>
  <body>
    <input type="text" placeholder="Search" class="searchbox">

    <div class="video1-preview">
      <div>
        <img src="img file/thumbnail-1.webp" class="thumbnail">
      </div>

      <div class="bottom-block">
        <div class="profile1">
          <img class="picture1" src="img file/channel-1.jpeg">
        </div>

        <div class="description">
          <p class="video-title">
            Talking Tech and AI with google CEO sunder Pichai!
          </p>
          <p class="video-author">
            Marques Brownlee
          </p>
          <p class="video-stats">
            3.4M views · 6 months ago
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
