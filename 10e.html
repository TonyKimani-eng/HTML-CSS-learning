<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        
        div {
            padding: 0px;
            margin: 10px 0;
            
            border: 1px solid #ccc;
        }
        .account-div {
            width:200px;
        }
        .profpic-div{
            width: 150px;
            padding: 0px;
            margin-bottom: 0px;
        }
        .account-name{
            margin-left: 5px;
            padding-top: 0px;
            margin-top: 5px;
            margin-bottom: 0px;
        }
        .prof-pic{
            width: 150px;
        }
        .smalldog-pic{
            width: 30px;
            height: 30px;
            border-radius: 16px;
            margin: 0px;
            margin-left: 5px;
        

        }
        .mutual-text{
            font-size: 10px;
            
        }
        .small-image {
            display: inline-block;
            vertical-align:top;

        }
        .mutual-friends{
            margin-top: 20px;
            margin: 0px;
            padding: 0px;
            margin-top: 1px;
        }
        .mutual-div{
            display: inline-block;
            vertical-align:top;
            

        }
        .name-text{
            margin: 0px;
            padding: 0px;
        }
        .button-div{
            margin-top: 0px;
        }
        .add-button{
            color: white;
            background-color: rgb(52, 113, 217);
            width: 90px;
            border-radius: 2px;
            border: none;
            padding-top: 5px;
            padding-bottom: 5px;
            margin-left: 5px;
            margin-top: 0px;

        }
    </style>
</head>
<body>
    <div class="account-div">
     <div class="profpic-div">   
        <img class="prof-pic" src="img folder/cat.jpg">
    </div>
    <div class="account-name">
        <p class="name-text">
            Oliver
            
        </p>
    </div>
    <div class="mutual-friends">
        
        
        <div class="small-image">
            <img class="smalldog-pic"   src="img folder/dog2.jpg">
        </div>
        <div class="mutual-div">
            <p class="mutual-text">
            2 mutual friends
            </p>
        </div>
    </div>
    <div class="button-div">
        <button class="add-button">
            Add Friend
        </button>
    </div>
    </div>
</body>
</html>
